[workspace]
authors = ["valmathieu <valentinmathieu@proton.me>"]
channels = ["conda-forge"]
name = "Mycotopo"
platforms = ["win-64", "linux-64"]
version = "0.1.0"

[activation.env]
PYTHONPATH = "src"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[tasks]
# Install/sync all environments. Run after pulling changes or editing pixi.toml.
setup = "pixi install"

# Launch Jupyter Lab rooted at the notebooks/ folder.
notebook = "jupyter lab --notebook-dir=notebooks"

[feature.dev.tasks]
# Lint + format check (non-destructive, CI-friendly).
lint = "ruff check . && ruff format --check ."

# Auto-fix lint issues and apply formatting (destructive, for local use).
fmt = "ruff check --fix . && ruff format ."

# Static type checking on the source package.
typecheck = "mypy src"

# Run the test suite.
test = "pytest"

# Full pre-commit check: lint + typecheck + tests.
check = { depends-on = ["lint", "typecheck", "test"] }

[dependencies]
python = "3.12.*"
gdal = ">=3.12.3,<4"
geopandas = ">=1.1.3,<2"
shapely = ">=2.1.2,<3"
rasterio = ">=1.5.0,<2"
fiona = ">=1.10.1,<2"
pyproj = ">=3.7.2,<4"
duckdb = ">=1.5.2,<2"
folium = ">=0.20.0,<0.21"
plotly = ">=6.6.0,<7"
matplotlib = ">=3.10.8,<4"
jupyterlab = ">=4.5.6,<5"
ipykernel = ">=7.2.0,<8"
python-dotenv = ">=1.2.2,<2"

[feature.dev.dependencies]
pytest = "*"
ruff = "*"
mypy = "*"
